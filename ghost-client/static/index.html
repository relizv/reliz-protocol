<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliz Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #06090f;
            --bg-card: rgba(14, 20, 33, 0.85);
            --bg-input: rgba(10, 15, 26, 0.9);
            --border: rgba(0, 230, 118, 0.12);
            --border-focus: rgba(0, 230, 118, 0.4);
            --text-primary: #e8ecf1;
            --text-secondary: #7a8599;
            --text-dim: #4a5568;
            --accent: #00e676;
            --accent-glow: rgba(0, 230, 118, 0.15);
            --accent-dim: #00c853;
            --danger: #ff5252;
            --danger-glow: rgba(255, 82, 82, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 230, 118, 0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 100, 200, 0.04), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(0, 230, 118, 0.2);
        }

        /* Token input */
        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .token-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .token-input::placeholder {
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
        }

        .token-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .token-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Connect button */
        .connect-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .connect-btn.idle {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #06090f;
            box-shadow: 0 4px 24px var(--accent-glow);
        }

        .connect-btn.idle:hover {
            box-shadow: 0 6px 32px rgba(0, 230, 118, 0.25);
            transform: translateY(-1px);
        }

        .connect-btn.idle:active {
            transform: translateY(0);
        }

        .connect-btn.connecting {
            background: rgba(0, 230, 118, 0.1);
            color: var(--accent);
            border: 1px solid var(--border-focus);
            cursor: wait;
        }

        .connect-btn.connected {
            background: rgba(255, 82, 82, 0.08);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.25);
        }

        .connect-btn.connected:hover {
            background: rgba(255, 82, 82, 0.15);
            box-shadow: 0 4px 24px var(--danger-glow);
        }

        .connect-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Status section */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status-dot.connecting {
            background: #ffc107;
            animation: pulse-dot 0.8s ease-in-out infinite;
        }

        .status-dot.error {
            background: var(--danger);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
            50% { opacity: 0.5; box-shadow: 0 0 16px currentColor; }
        }

        .status-text {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .status-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
            margin-left: auto;
        }

        /* Error toast */
        .error-msg {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255, 82, 82, 0.08);
            border: 1px solid rgba(255, 82, 82, 0.2);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--danger);
            display: none;
        }

        .error-msg.visible {
            display: block;
            animation: fade-in 0.2s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Version footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Reliz Protocol</div>
            <div class="subtitle">stealth proxy</div>
        </div>

        <div class="card">
            <div class="input-group">
                <label class="input-label" for="token-input">Connection Token</label>
                <input
                    type="text"
                    id="token-input"
                    class="token-input"
                    placeholder="Вставьте rlz_... токен"
                    spellcheck="false"
                    autocomplete="off"
                >
            </div>

            <button id="connect-btn" class="connect-btn idle" onclick="handleConnect()">
                Connect
            </button>

            <div id="error-msg" class="error-msg"></div>

            <div class="status-bar">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text" class="status-text">Disconnected</span>
                <span id="status-time" class="status-time"></span>
            </div>
        </div>

        <div class="footer">v0.1.0 — socks5 on 127.0.0.1:10808</div>
    </div>

    <script>
        const STATUS = { STOPPED: 0, CONNECTING: 1, CONNECTED: 2, ERROR: 3 };
        let currentStatus = STATUS.STOPPED;
        let pollInterval = null;
        let startTime = null;

        const $btn = document.getElementById('connect-btn');
        const $input = document.getElementById('token-input');
        const $dot = document.getElementById('status-dot');
        const $text = document.getElementById('status-text');
        const $time = document.getElementById('status-time');
        const $error = document.getElementById('error-msg');

        function showError(msg) {
            $error.textContent = msg;
            $error.classList.add('visible');
            setTimeout(() => $error.classList.remove('visible'), 5000);
        }

        function hideError() {
            $error.classList.remove('visible');
        }

        function updateUI(status) {
            currentStatus = status;
            $dot.className = 'status-dot';
            $btn.className = 'connect-btn';

            switch (status) {
                case STATUS.STOPPED:
                    $dot.classList.add('');
                    $btn.classList.add('idle');
                    $btn.textContent = 'Connect';
                    $btn.disabled = false;
                    $text.textContent = 'Disconnected';
                    $input.disabled = false;
                    $time.textContent = '';
                    startTime = null;
                    break;
                case STATUS.CONNECTING:
                    $dot.classList.add('connecting');
                    $btn.classList.add('connecting');
                    $btn.textContent = 'Connecting...';
                    $btn.disabled = true;
                    $text.textContent = 'Connecting';
                    $input.disabled = true;
                    break;
                case STATUS.CONNECTED:
                    $dot.classList.add('connected');
                    $btn.classList.add('connected');
                    $btn.textContent = 'Disconnect';
                    $btn.disabled = false;
                    $text.textContent = 'Connected';
                    $input.disabled = true;
                    if (!startTime) startTime = Date.now();
                    break;
                case STATUS.ERROR:
                    $dot.classList.add('error');
                    $btn.classList.add('idle');
                    $btn.textContent = 'Connect';
                    $btn.disabled = false;
                    $text.textContent = 'Error';
                    $input.disabled = false;
                    startTime = null;
                    break;
            }
        }

        function updateTimer() {
            if (!startTime) { $time.textContent = ''; return; }
            const secs = Math.floor((Date.now() - startTime) / 1000);
            const h = String(Math.floor(secs / 3600)).padStart(2, '0');
            const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
            const s = String(secs % 60).padStart(2, '0');
            $time.textContent = `${h}:${m}:${s}`;
        }

        async function pollStatus() {
            try {
                const res = await fetch('/api/status');
                if (!res.ok) return;
                const data = await res.json();
                updateUI(data.status);
                if (data.status === STATUS.CONNECTED && data.uptime_secs > 0) {
                    startTime = Date.now() - data.uptime_secs * 1000;
                }
                updateTimer();
            } catch (_) {}
        }

        function startPolling() {
            if (pollInterval) return;
            pollInterval = setInterval(pollStatus, 1000);
        }

        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        async function handleConnect() {
            hideError();

            if (currentStatus === STATUS.CONNECTED) {
                // Disconnect
                try {
                    updateUI(STATUS.CONNECTING);
                    const res = await fetch('/api/disconnect', { method: 'POST' });
                    if (!res.ok) {
                        const data = await res.json().catch(() => ({}));
                        showError(data.error || 'Failed to disconnect');
                    }
                } catch (e) {
                    showError('Network error');
                }
                return;
            }

            // Connect
            const token = $input.value.trim();
            if (!token) {
                showError('Вставьте токен подключения');
                $input.focus();
                return;
            }
            if (!token.startsWith('rlz_')) {
                showError('Токен должен начинаться с rlz_');
                $input.focus();
                return;
            }

            try {
                updateUI(STATUS.CONNECTING);
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token }),
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.error || 'Connection failed');
                    updateUI(STATUS.ERROR);
                    return;
                }
                startPolling();
            } catch (e) {
                showError('Network error');
                updateUI(STATUS.ERROR);
            }
        }

        // Enter key to connect
        $input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleConnect();
        });

        // Auto-paste from clipboard on focus (if empty)
        $input.addEventListener('focus', async () => {
            if ($input.value) return;
            try {
                const text = await navigator.clipboard.readText();
                if (text && text.startsWith('rlz_')) {
                    $input.value = text;
                }
            } catch (_) {}
        });

        // Start polling on load
        startPolling();
    </script>
</body>
</html>
