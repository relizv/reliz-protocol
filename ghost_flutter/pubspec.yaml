name: reliz_protocol
description: Reliz Protocol - Stealth VPN Client
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.0.0
  vpn_service:
    git:
      url: https://github.com/nicepkg/vpn_service.git
      ref: main
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  # Обработка deep links вида relizproxy:// и ghostproxy:// для
  # автозаполнения полей подключения и автоматического коннекта.
  app_links: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  ffigen: ^11.0.0

flutter:
  uses-material-design: true
